name: E2E - Finalização Pedido

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: e2e-finalizacao-pedido-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalizacao-pedido:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run test (dev -> PROD)
        env:
          URL: ${{ vars.URL }}
          PYTEST_ARTIFACTS_ROOT: artifacts
          # Na CI, falhar (em vez de skip) quando faltar credencial
          E2E_REQUIRE_CREDS: "1"
          # Credenciais usadas por get_creds("HUB_TESTE2_BRUNO_POPUP") (definir como secrets)
          E2E_HUB_TESTE2_BRUNO_POPUP_USER: ${{ secrets.E2E_HUB_TESTE2_BRUNO_POPUP_USER }}
          E2E_HUB_TESTE2_BRUNO_POPUP_PASS: ${{ secrets.E2E_HUB_TESTE2_BRUNO_POPUP_PASS }}
        run: >
          pytest
          -q
          Testes/PROD/Default/test_8_finalizacao_pedidos_pipeline.py
          --grid local
          --headless
          --target-env prod
          --timeout 20
          --maxfail=1
          --record-screen
          --junitxml=artifacts/junit.xml

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts

