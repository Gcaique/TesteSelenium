name: E2E - Primeiro Acesso (Smoke)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-primeiro-acesso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  primeiro-acesso:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run test (main -> PROD)
        env:
          URL: ${{ vars.URL }}
          PYTEST_ARTIFACTS_ROOT: artifacts
        run: >
          pytest
          -q
          Testes/PROD/Default/test_4_primeiroAcesso.py
          --grid local
          --headless
          --target-env prod
          --timeout 15
          --maxfail=1
          --record-screen
          --junitxml=artifacts/junit.xml

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts
