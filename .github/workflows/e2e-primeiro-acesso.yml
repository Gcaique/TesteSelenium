name: E2E - Primeiro Acesso (Smoke)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: e2e-primeiro-acesso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  primeiro-acesso:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run test (main -> PROD)
        env:
          URL: ${{ vars.URL }}
          PYTEST_ARTIFACTS_ROOT: artifacts
          # Magento API (helpers/firstAcess.py)
          FIRST_ACCESS_API_BASE_URL: ${{ vars.FIRST_ACCESS_API_BASE_URL }}
          USER_ADMIN: ${{ secrets.USER_ADMIN }}
          PASSWORD_ADMIN: ${{ secrets.PASSWORD_ADMIN }}
          # Primeiro acesso (definir em Settings -> Secrets and variables -> Actions)
          TOKEN: ${{ secrets.TOKEN }}
          # Credenciais usadas por get_creds("CAIQUE_OLIVEIRA2") (definir como secrets)
          E2E_CAIQUE_OLIVEIRA2_USER: ${{ secrets.E2E_CAIQUE_OLIVEIRA2_USER }}
          E2E_CAIQUE_OLIVEIRA2_PASS: ${{ secrets.E2E_CAIQUE_OLIVEIRA2_PASS }}
          # Na CI, falhar (em vez de skip) quando faltar credencial
          E2E_REQUIRE_CREDS: "1"
        run: >
          pytest
          -q
          Testes/PROD/Default/test_4_primeiroAcesso.py
          --grid local
          --headless
          --target-env prod
          --timeout 15
          --maxfail=1
          --record-screen
          --junitxml=artifacts/junit.xml

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts
